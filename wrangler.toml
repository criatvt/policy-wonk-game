# Cloudflare Pages + Functions config for Policy Wonk.
#
# Three environments:
#   - top-level (no [env.<name>] block) → `wrangler pages dev`, local development
#   - [env.preview]                     → preview deploys (phase-1 branch, PR previews)
#   - [env.production]                  → production deploys (main branch only)
#
# Each env binds its own D1 database and KV namespace so preview/dev can never
# touch prod user data. The `database_id` and KV `id` are filled in after
# running `wrangler d1 create` / `wrangler kv namespace create` (see CONTRIBUTING.md).
#
# Secrets (RESEND_API_KEY, SESSION_SECRET) are NOT stored here — they're set
# per env via `wrangler pages secret put <NAME> --env <env>`.

name = "policy-wonk-game"
pages_build_output_dir = "./dist"
compatibility_date = "2026-01-15"
compatibility_flags = ["nodejs_compat"]

# ---------- local dev (`wrangler pages dev`) ----------

[[d1_databases]]
binding = "DB"
database_name = "policy-wonk-dev"
database_id = "baa50072-d29e-4e11-952f-5888caf4d94f"

[[kv_namespaces]]
binding = "KV"
id = "57557e36571c4c64b0ae61aed779d7f0"

# Workers Analytics Engine — first-party quiz funnel events (#12). DISABLED
# until Analytics Engine is enabled on the Cloudflare account: a declared
# binding fails the Pages deploy if AE isn't provisioned. The /api/events
# route no-ops gracefully without the EVENTS binding, so the rest of the
# site deploys fine. To activate the funnel: enable Analytics Engine in the
# dashboard, then uncomment all three blocks (dev / preview / production).
# [[analytics_engine_datasets]]
# binding = "EVENTS"
# dataset = "policy_wonk_events_dev"

[vars]
ENV = "dev"
ADMIN_EMAILS = "aasif@aasifj.com"
RESEND_FROM = "noreply@policywonkgame.aasifj.com"

# ---------- preview (phase-N branches, PR previews) ----------

[env.preview]

[[env.preview.d1_databases]]
binding = "DB"
database_name = "policy-wonk-staging"
database_id = "3d8f7203-eb68-4895-8366-aa1356305d04"

[[env.preview.kv_namespaces]]
binding = "KV"
id = "a82d2d31fac9499bbc9189d770b42633"

# Disabled pending Analytics Engine on the account — see the dev block above.
# [[env.preview.analytics_engine_datasets]]
# binding = "EVENTS"
# dataset = "policy_wonk_events_staging"

[env.preview.vars]
ENV = "preview"
ADMIN_EMAILS = "aasif@aasifj.com"
RESEND_FROM = "noreply@policywonkgame.aasifj.com"

# ---------- production (main branch only) ----------

[env.production]

[[env.production.d1_databases]]
binding = "DB"
database_name = "policy-wonk-prod"
database_id = "fc7e05fd-e9bb-4d2f-912e-4f589c7ed18b"

[[env.production.kv_namespaces]]
binding = "KV"
id = "da6a9159fe6c4edf916b40cde7a590b1"

# Disabled pending Analytics Engine on the account — see the dev block above.
# [[env.production.analytics_engine_datasets]]
# binding = "EVENTS"
# dataset = "policy_wonk_events"

[env.production.vars]
ENV = "production"
ADMIN_EMAILS = "aasif@aasifj.com"
RESEND_FROM = "noreply@policywonkgame.aasifj.com"
